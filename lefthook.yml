pre-commit:
  parallel: true
  fail_on_changes: ci
  jobs:
    - run: pnpm exec cspell lint {staged_files}
    - run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - run: pnpm exec oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
